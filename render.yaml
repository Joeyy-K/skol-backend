services:
  # A PostgreSQL database
  - type: pserv
    name: skol-db
    env: postgres
    plan: free # You can upgrade this later
    postgresmajorVersion: 14 # Use a modern version
    disk:
      sizeGB: 1

  # The Django Web Service
  - type: web
    name: skol-backend
    env: python
    plan: free # You can upgrade this later
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    healthCheckPath: "/api/health/" # We will create this simple health check endpoint
    envVars:
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: skol-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true # Render will generate a secure secret key
      - key: WEB_CONCURRENCY
        value: 4
      - key: PYTHON_VERSION
        value: 3.12.3 # Match your local Python version