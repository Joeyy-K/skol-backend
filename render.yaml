services:
  # A PostgreSQL database
  - type: pserv
    name: skol-db
    env: postgres
    plan: free # You can upgrade this later
    postgresVersion: 14
    disk:
      sizeGB: 1

  # The Django Web Service
  - type: web
    name: skol-backend
    env: python
    plan: free # You can upgrade this later
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    healthCheckPath: "/api/health/" # We will create this simple health check endpoint
    envVars:
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: skol-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true # Render will generate a secure secret key
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "skol-backend.onrender.com,localhost,127.0.0.1"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: PYTHON_VERSION
        value: "3.12.3" # Match your local Python version