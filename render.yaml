services:
  # A PostgreSQL database
  - type: pserv
    name: skol-db
    databaseName: skol_database
    user: skol_user
    plan: free

  # The Django Web Service  
  - type: web
    name: skol-backend
    runtime: python3
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    healthCheckPath: "/api/health/"
    envVars:
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: skol-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "skol-backend.onrender.com,localhost,127.0.0.1"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: PYTHON_VERSION
        value: "3.12.3"