services:
  - type: web
    name: skol-backend
    runtime: python          # Use 'runtime' instead of deprecated 'env'
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    healthCheckPath: "/api/health/"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skol-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "skol-backend.onrender.com,localhost,127.0.0.1"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: PYTHON_VERSION
        value: "3.12.3"

databases:
  - name: skol-db
    plan: free
    postgresMajorVersion: '14'
    diskSizeGB: 1
